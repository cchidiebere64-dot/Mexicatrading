<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're Offline — MexicaTrading</title>
  <link rel="icon" href="/logo.png" />
  <meta name="theme-color" content="#0f172a" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #020617 0%, #071032 50%, #03040b 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
      position: relative;
    }

    /* Animated background blobs */
    body::before, body::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
      animation: float 8s ease-in-out infinite;
    }

    body::before {
      background: #10b981;
      top: -100px;
      left: -100px;
    }

    body::after {
      background: #3b82f6;
      bottom: -100px;
      right: -100px;
      animation-delay: 2s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(30px, 30px); }
    }

    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
      position: relative;
      z-index: 10;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo-wrap {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #10b981, #3b82f6);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
    }

    .logo-wrap img {
      width: 50px;
      height: 50px;
      object-fit: contain;
    }

    .icon {
      font-size: 64px;
      margin-bottom: 16px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 12px;
      background: linear-gradient(90deg, #10b981, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      color: #94a3b8;
      font-size: 16px;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .domain {
      font-weight: 600;
      color: #10b981;
    }

    .info-box {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 24px;
      font-size: 14px;
      color: #cbd5e1;
      backdrop-filter: blur(10px);
    }

    .info-box ul {
      list-style: none;
      text-align: left;
    }

    .info-box li {
      padding: 6px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .info-box li::before {
      content: '•';
      color: #10b981;
      font-weight: bold;
    }

    .retry-btn {
      background: linear-gradient(135deg, #10b981, #3b82f6);
      color: white;
      border: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
    }

    .retry-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 15px 40px rgba(16, 185, 129, 0.4);
    }

    .retry-btn:active {
      transform: translateY(0);
    }

    .footer {
      margin-top: 32px;
      font-size: 12px;
      color: #475569;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 20px;
      font-size: 12px;
      color: #fca5a5;
      margin-bottom: 16px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      background: #ef4444;
      border-radius: 50%;
      animation: blink 1.5s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @media (max-width: 480px) {
      h1 { font-size: 24px; }
      p { font-size: 14px; }
      .icon { font-size: 48px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-wrap">
      <img src="/logo.png" alt="MexicaTrading" onerror="this.style.display='none'" />
    </div>

    <div class="status">
      <span class="status-dot"></span>
      <span>No Connection</span>
    </div>

    <div class="icon">📡</div>

    <h1>You're Offline</h1>

    <p>
      We can't reach <span class="domain">mexicatrading.com</span> right now. Check your internet connection and try again.
    </p>

    <div class="info-box">
      <ul>
        <li>Check your Wi-Fi or mobile data</li>
        <li>Make sure airplane mode is off</li>
        <li>Try again in a few seconds</li>
      </ul>
    </div>

    <button class="retry-btn" onclick="window.location.reload()">
      🔄 Try Again
    </button>

    <div class="footer">
      MexicaTrading · Secure Investment Platform
    </div>
  </div>

  <script>
    // Auto-retry every 5 seconds when connection comes back
    window.addEventListener('online', () => {
      window.location.reload();
    });

    // Check connection periodically
    setInterval(() => {
      if (navigator.onLine) {
        fetch('/', { method: 'HEAD', cache: 'no-cache' })
          .then(() => window.location.reload())
          .catch(() => {});
      }
    }, 5000);
  </script>
</body>
</html>
